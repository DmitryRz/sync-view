services:
  db-keycloak:
    image: postgres:15
    container_name: postgres_keycloak
    environment:
      POSTGRES_USER: ${KC_DB_USER}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
      POSTGRES_DB: ${KC_DB_NAME}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KC_DB_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: keycloak
    restart: always
    deploy:
      resources:
        limits:
          memory: 1500M
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/${KC_DB_NAME}
      KC_DB_USERNAME: ${KC_DB_USER}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      JAVA_OPTS_APPEND: "-Xms512m -Xmx1024m"
    command: start-dev  --health-enabled=true --import-realm
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8180:8080"
    depends_on:
      db-keycloak:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e \"GET /auth/health/ready HTTP/1.1\r

            Host: localhost\r

            Connection: close\r

            \r

            \" >&3 && cat <&3 | grep -q \"200 OK\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      BACKEND_ACCESS_KEY: ${BACKEND_ACCESS_KEY}
      BACKEND_SECRET_KEY: ${BACKEND_SECRET_KEY}
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME}; /usr/bin/mc anonymous set download myminio/${MINIO_BUCKET_NAME}; /usr/bin/mc admin user svcacct add myminio $MINIO_ROOT_USER --access-key $BACKEND_ACCESS_KEY --secret-key $BACKEND_SECRET_KEY || true; exit 0; "

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server/sync-view-platform
    container_name: syncview_backend
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      KEYCLOAK_JWK_SET_URI: ${KEYCLOAK_JWK_SET_URI}
      MINIO_INTERNAL_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_BUCKET: ${MINIO_BUCKET_NAME}
      MINIO_ACCESS_KEY: ${BACKEND_ACCESS_KEY}
      MINIO_SECRET_KEY: ${BACKEND_SECRET_KEY}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./client
      args:
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
    container_name: syncview_frontend
    stdin_open: true
    tty: true

  gateway:
    image: nginx:alpine
    container_name: syncview_gateway
    ports:
      - "80:80"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  postgres_data:
  keycloak_data:
  minio_data:
