services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-syncview}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server/sync-view-platform
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PROFILE: ${APP_PROFILE:-dev}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-syncview}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://bintry.localhost/api}
    stdin_open: true
    tty: true

  gateway:
    image: nginx:alpine
    ports:
      - "127.0.0.1:80:80"
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-bintry.localhost}
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  postgres_data:
