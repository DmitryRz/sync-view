spring:
  profiles:
    active: ${APP_PROFILE:dev}
  application:
    name: syncview

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
---
# --- ПРОФИЛЬ DEV ---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:syncview}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# --- ПРОФИЛЬ PROD ---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  servlet:
    context-path: /
  tomcat:
    max-swallow-size: 10MB
    max-http-form-post-size: 10MB

logging:
  level:
    root: INFO
    org.springframework: WARN
    com.yourpackage.syncview: INFO